[global]
api_key = "han1234"
admin_username = "admin"
admin_password = "admin"

[sora]
base_url = "https://sora.chatgpt.com/backend"
timeout = 120
max_retries = 3
poll_interval = 10
max_poll_attempts = 600

[server]
host = "0.0.0.0"
port = 8000

[database]
# 数据库类型: sqlite, mysql
# sqlite: 单机部署，支持100-300并发
# mysql: 分布式部署，支持500-1000+并发
type = "sqlite"

# SQLite 配置 (当 type = "sqlite" 时使用)
sqlite_path = "data/hancat.db"

# MySQL 配置 (当 type = "mysql" 时使用)
# 需要先创建数据库: CREATE DATABASE sora2api CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
mysql_host = "localhost"
mysql_port = 3306
mysql_user = "root"
mysql_password = ""
mysql_database = "sora2api"
mysql_pool_size = 20

[redis]
# Redis 配置 (用于分布式锁和缓存)
# 启用后支持多实例部署和更高并发
enabled = false
host = "localhost"
port = 6379
password = ""
db = 0
# 锁超时时间 (秒)
lock_timeout = 300

[debug]
enabled = false
log_requests = true
log_responses = true
mask_token = true

[cache]
enabled = false
timeout = 600
base_url = "http://127.0.0.1:8000"
max_concurrency = 3

[generation]
image_timeout = 300
video_timeout = 1500

[admin]
error_ban_threshold = 3

[proxy]
proxy_enabled = false
proxy_url = ""
proxy_pool_enabled = false
image_upload_proxy_enabled = false
image_upload_proxy_url = ""
# 图片上传代理模式：inherit=继承普通代理，dedicated=使用 image_upload_proxy_url，direct=直连，remote_pool=每小时懒刷新远程代理池并在上传时随机选择 HTTP/HTTPS 代理
image_upload_proxy_mode = "inherit"

[watermark_free]
watermark_free_enabled = true
parse_method = "builtin"
custom_parse_url = ""
custom_parse_token = ""
max_concurrency = 2
fallback_on_failure = true

[token_refresh]
at_auto_refresh_enabled = false

[lambda]
enabled = false
api_url = ""
api_key = ""
max_concurrency = 5
max_connections = 20
max_keepalive_connections = 10
keepalive_expiry = 20
timeout = 30

[translation]
# 自动翻译配置 (中文 -> 英文)
# 使用 OpenAI 兼容的 API 进行翻译
enabled = false
api_url = "http://64.23.250.221:3000/v1/chat/completions"
api_key = ""
model = "gpt-5-nano"
timeout = 30

[call_logic]
call_mode = "default"

[timezone]
# 时区偏移小时数，默认为东八区（中国标准时间）
# 可选值：-12 到 +14 的整数
# 常用时区：中国/新加坡 +8, 日本/韩国 +9, 伦敦 0, 纽约 -5, 洛杉矶 -8
timezone_offset = 8

[pow_service]
mode = "local"
use_token_for_pow = false
server_url = "http://localhost:8002"
api_key = "your-secure-api-key-here"
proxy_enabled = false
proxy_url = ""
